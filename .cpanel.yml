---
deployment:
  tasks:
    - export DEPLOYPATH=/home/bfinitia/public_html/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/mkdir -p $DEPLOYPATH/admin
    - /bin/mkdir -p $DEPLOYPATH/scholar-portal
    - /bin/mkdir -p $DEPLOYPATH/assets
    - /bin/mkdir -p $DEPLOYPATH/Images

    - /bin/cp index.html $DEPLOYPATH/index.html
    - /bin/cp about.html $DEPLOYPATH/about.html
    - /bin/cp achievements.html $DEPLOYPATH/achievements.html
    - /bin/cp apply.html $DEPLOYPATH/apply.html
    - /bin/cp contact.html $DEPLOYPATH/contact.html
    - /bin/cp faq.html $DEPLOYPATH/faq.html
    - /bin/cp mentor.html $DEPLOYPATH/mentor.html
    - /bin/cp partnership.html $DEPLOYPATH/partnership.html
    - /bin/cp programs.html $DEPLOYPATH/programs.html
    - /bin/cp stories.html $DEPLOYPATH/stories.html
    - /bin/cp support.html $DEPLOYPATH/support.html
    - /bin/cp talent.html $DEPLOYPATH/talent.html

    - /bin/cp site.css $DEPLOYPATH/site.css
    - /bin/cp site.js $DEPLOYPATH/site.js
    - /bin/cp application-theme.css $DEPLOYPATH/application-theme.css

    - /bin/cp app_bootstrap.php $DEPLOYPATH/app_bootstrap.php
    - /bin/cp check-status.php $DEPLOYPATH/check-status.php
    - /bin/cp graduate_scholarship.php $DEPLOYPATH/graduate_scholarship.php
    - /bin/cp primary_scholarship.php $DEPLOYPATH/primary_scholarship.php
    - /bin/cp secondary_scholarship.php $DEPLOYPATH/secondary_scholarship.php
    - /bin/cp privacy-policy.php $DEPLOYPATH/privacy-policy.php
    - /bin/cp success.php $DEPLOYPATH/success.php
    - /bin/cp process_application.php $DEPLOYPATH/process_application.php
    - /bin/cp process_nomination.php $DEPLOYPATH/process_nomination.php
    - /bin/cp process-form.php $DEPLOYPATH/process-form.php
    - /bin/cp process_contact.php $DEPLOYPATH/process_contact.php

    - /bin/cp -R assets/. $DEPLOYPATH/assets/
    - /bin/cp -R Images/. $DEPLOYPATH/Images/

    - /usr/bin/find admin -mindepth 1 -maxdepth 1 ! -name vendor ! -name uploads ! -name logs ! -name backups -exec /bin/cp -R {} $DEPLOYPATH/admin/ \;
    - /usr/bin/find scholar-portal -mindepth 1 -maxdepth 1 ! -name uploads ! -name logs ! -name backups -exec /bin/cp -R {} $DEPLOYPATH/scholar-portal/ \;
